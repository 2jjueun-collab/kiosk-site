<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>음성 키오스크</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 상태 안내 패널 -->
  <div id="info-panel">
    <div id="store-name">음성 키오스크</div>
    <div id="status-text">초기화 중...</div>
    <div id="voice-output"></div>
    <div id="mic-indicator">
      <span class="mic-icon">🎤</span>
      <span id="mic-text">대기 중</span>
    </div>
  </div>

  <!-- 터치 버튼 영역 -->
  <div id="touch-area">
    <button id="btn1" class="touch-btn" onclick="handleTouch(1)">
      <span class="btn-number">1</span>
      <span class="btn-label">확인 / 예</span>
    </button>
    <button id="btn2" class="touch-btn btn2" onclick="handleTouch(2)">
      <span class="btn-number">2</span>
      <span class="btn-label">취소 / 아니오</span>
    </button>
  </div>

  <!-- 현재 선택 메뉴 표시 -->
  <div id="order-summary" style="display:none;">
    <div id="order-item-name"></div>
    <div id="order-item-price"></div>
  </div>

  <!-- 결제 화면 -->
  <div id="payment-screen" style="display:none;">
    <div class="payment-title">✅ 주문 완료</div>
    <div id="payment-menu-name"></div>
    <div id="payment-price"></div>
    <div class="payment-sub">카운터에서 결제해 주세요</div>
    <button class="restart-btn" onclick="restartApp()">🔄 처음으로</button>
  </div>

  <script src="menu.js"></script>
  <script src="speech.js"></script>
  <script src="app.js"></script>
</body>
</html>
