<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>음성 키오스크</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 상태 안내 패널 -->
  <div id="info-panel">
    <div id="store-name">음성 키오스크</div>
    <div id="status-text">초기화 중...</div>
    <div id="voice-output"></div>
    <div id="mic-indicator">
      <span class="mic-icon">🎤</span>
      <span id="mic-text">대기 중</span>
    </div>
  </div>

  <!-- 전체 화면 터치 안내 영역 -->
  <div id="touch-area" aria-live="polite">
    <div id="tap-guide">
      <div id="tap-count">화면 터치</div>
      <div id="tap-help">한 번 터치 = 1번 · 두 번 터치 = 2번</div>
    </div>
  </div>

  <!-- 현재 선택 메뉴 표시 -->
  <div id="order-summary" style="display:none;">
    <div id="order-item-name"></div>
    <div id="order-item-price"></div>
  </div>

  <!-- 결제 화면 -->
  <div id="payment-screen" style="display:none;">
    <div class="payment-title">✅ 주문 완료</div>
    <div id="payment-menu-name"></div>
    <div id="payment-price"></div>
    <div class="payment-sub">카운터에서 결제해 주세요</div>
    <div class="payment-touch-guide">화면을 한 번 터치하면 처음으로 돌아갑니다</div>
  </div>

  <script src="menu.js"></script>
  <script src="speech.js"></script>
  <script src="app.js"></script>
</body>
</html>
